◆【言霊（ことだま）】<br>
▲霊（たま） 磨（みが）くために生（う）まれし事を思え．<br>
辛（つら）く悲（かな）しき淵（ふち）に立つ時（とき） いやいやの事でも勇（いさ）み喜（よろこ）べ．<br>
我（われ） 霊（たま） 磨（みが）くため生（う）まれ変（か）わりし事を思い うらみつらむ事 無かれ．<br>
我（われ） 生（う）まれし事は 全て霊（たま） 磨（みが）くためと思え．<br>
